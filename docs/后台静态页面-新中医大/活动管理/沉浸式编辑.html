<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>沉浸式编辑 - 新中医大 CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../static-admin-theme.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="../static-admin-shell.js"></script>
    <script>
      renderPage({
        parent: "活动管理",
        child: "沉浸式编辑",
        title: "沉浸式编辑",
        description: "编辑沉浸式活动内容，支持富文本、多媒体插入、动画配置与实时预览。",
        badges: ["内容编辑类", "富文本", "实时预览"],
        stats: [
          { label: "活动总数", value: "12", meta: "个活动", tone: "sky", help: "包含进行中、已结束活动" },
          { label: "草稿", value: "3", meta: "个", tone: "amber", help: "未发布的活动草稿" },
          { label: "已发布", value: "9", meta: "个", tone: "emerald", help: "已上线展示的活动" }
        ],
        content: `
          <section class="space-y-6">
            <!-- 工具栏 -->
            <div class="flex flex-wrap items-center justify-between gap-4 rounded-[28px] bg-white p-4 shadow-sm ring-1 ring-slate-200/80">
              <div class="flex gap-2">
                <button class="rounded-2xl bg-sky-600 px-4 py-2.5 text-sm font-semibold text-white">+ 新建活动</button>
                <button class="rounded-2xl border border-slate-200 px-4 py-2.5 text-sm font-semibold text-slate-600">导入模板</button>
                <button class="rounded-2xl border border-slate-200 px-4 py-2.5 text-sm font-semibold text-slate-600">保存草稿</button>
              </div>
              <div class="flex gap-2">
                <button class="rounded-2xl border border-sky-200 bg-sky-50 px-4 py-2.5 text-sm font-semibold text-sky-700">预览</button>
                <button class="rounded-2xl bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white">发布活动</button>
              </div>
            </div>

            <div class="grid gap-6 xl:grid-cols-[1fr_300px]">
              <!-- 编辑区 -->
              <div class="space-y-6">
                <!-- 基础信息 -->
                <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                  <h3 class="text-lg font-semibold text-slate-900">基础信息</h3>
                  <div class="mt-6 space-y-5">
                    <div>
                      <label class="mb-2 block text-sm font-medium text-slate-700">活动标题</label>
                      <input type="text" value="2026年春季学术研讨会" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm focus:border-sky-300 focus:bg-white focus:outline-none">
                    </div>
                    <div class="grid gap-5 md:grid-cols-2">
                      <div>
                        <label class="mb-2 block text-sm font-medium text-slate-700">活动时间</label>
                        <input type="text" value="2026-04-25 09:00" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm focus:border-sky-300 focus:bg-white focus:outline-none">
                      </div>
                      <div>
                        <label class="mb-2 block text-sm font-medium text-slate-700">活动地点</label>
                        <input type="text" value="学术报告厅A" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm focus:border-sky-300 focus:bg-white focus:outline-none">
                      </div>
                    </div>
                  </div>
                </div>

                <!-- 富文本编辑器 -->
                <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                  <div class="flex items-center justify-between">
                    <h3 class="text-lg font-semibold text-slate-900">活动详情</h3>
                    <div class="flex gap-1">
                      ${["B", "I", "U", "S"].map(fmt => `
                        <button class="h-8 w-8 rounded-lg border border-slate-200 text-sm font-bold text-slate-600 hover:bg-slate-50">${fmt}</button>
                      `).join('')}
                      <div class="w-px bg-slate-200 mx-1"></div>
                      <button class="h-8 w-8 rounded-lg border border-slate-200 text-sm text-slate-600 hover:bg-slate-50">📷</button>
                      <button class="h-8 w-8 rounded-lg border border-slate-200 text-sm text-slate-600 hover:bg-slate-50">🎬</button>
                      <button class="h-8 w-8 rounded-lg border border-slate-200 text-sm text-slate-600 hover:bg-slate-50">📎</button>
                    </div>
                  </div>
                  
                  <div class="mt-4 min-h-[250px] rounded-2xl border border-slate-200 bg-slate-50 p-4">
                    <p class="text-sm text-slate-600 leading-relaxed">本次研讨会将邀请国内外知名中医药专家，围绕"中医药现代化与国际化"主题展开深入讨论。会议包括主旨演讲、专题论坛、学术交流等环节，欢迎广大师生积极参与。</p>
                    <div class="mt-4 p-4 rounded-xl bg-white border border-slate-200">
                      <div class="flex items-center gap-3 mb-2">
                        <div class="h-8 w-8 rounded bg-sky-100 flex items-center justify-center text-sky-600">📅</div>
                        <span class="font-medium text-slate-700">会议议程</span>
                      </div>
                      <ul class="text-sm text-slate-600 space-y-1 ml-11">
                        <li>• 09:00-09:30 开幕式</li>
                        <li>• 09:30-12:00 主旨演讲</li>
                        <li>• 14:00-17:00 专题论坛</li>
                      </ul>
                    </div>
                  </div>
                </div>

                <!-- 多媒体 -->
                <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                  <h3 class="text-lg font-semibold text-slate-900">封面与多媒体</h3>
                  <div class="mt-6 grid gap-4 md:grid-cols-3">
                    <div class="rounded-2xl border-2 border-dashed border-slate-300 p-6 text-center">
                      <div class="h-32 bg-gradient-to-br from-sky-100 to-indigo-100 rounded-xl flex items-center justify-center mb-3">
                        <span class="text-4xl opacity-50">🖼️</span>
                      </div>
                      <button class="text-sm text-sky-600 hover:text-sky-700">上传封面图</button>
                    </div>
                    <div class="rounded-2xl border-2 border-dashed border-slate-300 p-6 text-center">
                      <div class="h-32 bg-gradient-to-br from-violet-100 to-purple-100 rounded-xl flex items-center justify-center mb-3">
                        <span class="text-4xl opacity-50">🎬</span>
                      </div>
                      <button class="text-sm text-sky-600 hover:text-sky-700">上传宣传视频</button>
                    </div>
                    <div class="rounded-2xl border-2 border-dashed border-slate-300 p-6 text-center">
                      <div class="h-32 bg-gradient-to-br from-emerald-100 to-teal-100 rounded-xl flex items-center justify-center mb-3">
                        <span class="text-4xl opacity-50">📁</span>
                      </div>
                      <button class="text-sm text-sky-600 hover:text-sky-700">添加附件</button>
                    </div>
                  </div>
                </div>
              </div>

              <!-- 侧边栏 -->
              <div class="space-y-6">
                <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                  <h3 class="text-lg font-semibold text-slate-900">发布设置</h3>
                  <div class="mt-4 space-y-4">
                    <div class="flex items-center justify-between">
                      <span class="text-sm text-slate-600">发布状态</span>
                      <span class="inline-flex rounded-full bg-amber-50 px-2.5 py-1 text-xs font-semibold text-amber-700 ring-1 ring-amber-100">草稿</span>
                    </div>
                    <div class="flex items-center justify-between">
                      <span class="text-sm text-slate-600">允许报名</span>
                      <button class="h-6 w-11 rounded-full bg-sky-500 relative">
                        <span class="absolute right-0.5 top-0.5 h-5 w-5 rounded-full bg-white shadow transition"></span>
                      </button>
                    </div>
                    <div class="flex items-center justify-between">
                      <span class="text-sm text-slate-600">置顶显示</span>
                      <button class="h-6 w-11 rounded-full bg-slate-200 relative">
                        <span class="absolute left-0.5 top-0.5 h-5 w-5 rounded-full bg-white shadow transition"></span>
                      </button>
                    </div>
                  </div>
                </div>

                <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                  <h3 class="text-lg font-semibold text-slate-900">预览效果</h3>
                  <div class="mt-4 rounded-2xl border border-slate-200 bg-gradient-to-br from-sky-50 to-indigo-50 p-4">
                    <div class="text-sm font-medium text-slate-800">2026年春季学术研讨会</div>
                    <div class="mt-2 text-xs text-slate-500">📅 2026-04-25 · 📍 学术报告厅A</div>
                    <div class="mt-3 h-20 rounded bg-white/80 flex items-center justify-center">
                      <span class="text-xs text-slate-400">封面预览</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        `
      });
    </script>
  </body>
</html>
