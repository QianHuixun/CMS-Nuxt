<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新中医大 CMS - 后台静态页面导航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./static-admin-theme.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="./static-admin-shell.js"></script>
    <script>
      renderPage({
        parent: "首页",
        child: "静态页面导航",
        title: "后台静态页面导航",
        description: "新中医大 CMS 后台管理系统静态页面集合，统一采用 Tailwind CSS 大圆角设计风格。",
        badges: ["静态原型", "V1.0"],
        stats: [
          { label: "页面总数", value: "10", meta: "个页面", tone: "sky", help: "包含 5 个父菜单 + 10 个子页面" },
          { label: "菜单分组", value: "5", meta: "个分组", tone: "emerald", help: "系统基础配置 / 人才科研 / 论文成果 / 自动化 / 活动管理" },
          { label: "UI 版本", value: "V1.0", meta: "当前版本", tone: "amber", help: "统一大圆角设计风格" }
        ],
        content: `
          <section class="grid gap-6 xl:grid-cols-2">
            ${[
              {
                parent: "系统基础配置管理",
                icon: '<svg viewBox="0 0 24 24" fill="none" class="h-6 w-6"><path d="M10.5 3h3l.7 2.3a7.4 7.4 0 0 1 1.75.73l2.17-1.03 2.12 2.12-1.03 2.17c.3.56.54 1.15.73 1.75L22 10.5v3l-2.3.7a7.4 7.4 0 0 1-.73 1.75l1.03 2.17-2.12 2.12-2.17-1.03a7.4 7.4 0 0 1-1.75.73L13.5 22h-3l-.7-2.3a7.4 7.4 0 0 1-1.75-.73l-2.17 1.03-2.12-2.12 1.03-2.17a7.4 7.4 0 0 1-.73-1.75L2 13.5v-3l2.3-.7c.16-.6.4-1.19.73-1.75L4 5.88l2.12-2.12 2.17 1.03c.56-.3 1.15-.54 1.75-.73L10.5 3Z" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="2.8" stroke="currentColor" stroke-width="1.5"/></svg>',
                children: [
                  { name: "导航配置", desc: "维护首页三大入口的名称、简介、链接与展示状态" },
                  { name: "屏保配置", desc: "配置系统屏保页面内容、跳转链接与启用状态" }
                ],
                color: "sky"
              },
              {
                parent: "人才与对应科研管理",
                icon: '<svg viewBox="0 0 24 24" fill="none" class="h-6 w-6"><path d="M15.5 7a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0Z" stroke="currentColor" stroke-width="1.5"/><path d="M4.5 19a5.5 5.5 0 0 1 11 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M17 10.5a2.5 2.5 0 1 0 0-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M18.5 19a4 4 0 0 0-2.5-3.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
                children: [
                  { name: "专家库管理", desc: "管理专家信息、学术背景、研究方向与联系方式" },
                  { name: "课题时空管理", desc: "管理课题信息、时间节点与空间分布数据" }
                ],
                color: "violet"
              },
              {
                parent: "论文著作与成果管理",
                icon: '<svg viewBox="0 0 24 24" fill="none" class="h-6 w-6"><path d="M7 3.75h8.5L20 8.25V20.5a.75.75 0 0 1-.75.75H7a3 3 0 0 1-3-3V6.75A3 3 0 0 1 7 3.75Z" stroke="currentColor" stroke-width="1.5"/><path d="M15.5 3.75V8.5H20" stroke="currentColor" stroke-width="1.5"/><path d="M8.5 12.5h7M8.5 16h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
                children: [
                  { name: "书籍导入", desc: "批量导入书籍信息，支持 Excel 格式上传与预览" },
                  { name: "仿真录入", desc: "录入仿真相关数据，支持批量导入与编辑" }
                ],
                color: "emerald"
              },
              {
                parent: "自动化辅助",
                icon: '<svg viewBox="0 0 24 24" fill="none" class="h-6 w-6"><path d="M6 19V9m6 10V5m6 14v-7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M4 19.5h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
                children: [
                  { name: "词云", desc: "根据关键词生成可视化词云图，支持自定义样式" },
                  { name: "图表生成", desc: "根据数据自动生成统计图表，支持多种图表类型" }
                ],
                color: "amber"
              },
              {
                parent: "活动管理",
                icon: '<svg viewBox="0 0 24 24" fill="none" class="h-6 w-6"><path d="m12 3 2.78 5.63 6.22.9-4.5 4.39 1.06 6.2L12 17.2l-5.56 2.92 1.06-6.2L3 9.53l6.22-.9L12 3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>',
                children: [
                  { name: "沉浸式编辑", desc: "编辑沉浸式活动内容，支持富文本与多媒体" },
                  { name: "头条精选", desc: "管理首页头条内容，设置推荐与排序" }
                ],
                color: "rose"
              }
            ].map(section => `
              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <div class="flex items-center gap-4">
                  <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-${section.color}-100 text-${section.color}-600">
                    ${section.icon}
                  </div>
                  <div>
                    <h3 class="text-lg font-semibold text-slate-900">${section.parent}</h3>
                    <p class="text-sm text-slate-500">${section.children.length} 个子菜单</p>
                  </div>
                </div>
                <div class="mt-4 space-y-3">
                  ${section.children.map(child => `
                    <a href="${child.name === '导航配置' ? '系统基础配置管理/导航配置.html' : 
                            child.name === '屏保配置' ? '系统基础配置管理/屏保配置.html' :
                            child.name === '专家库管理' ? '人才与对应科研管理/专家库管理.html' :
                            child.name === '课题时空管理' ? '人才与对应科研管理/课题时空管理.html' :
                            child.name === '书籍导入' ? '论文著作与成果管理/书籍导入.html' :
                            child.name === '仿真录入' ? '论文著作与成果管理/仿真录入.html' :
                            child.name === '词云' ? '自动化辅助/词云.html' :
                            child.name === '图表生成' ? '自动化辅助/图表生成.html' :
                            child.name === '沉浸式编辑' ? '活动管理/沉浸式编辑.html' :
                            '活动管理/头条精选.html'}" 
                       class="flex items-center justify-between rounded-2xl border border-slate-200 px-4 py-3 transition hover:border-${section.color}-300 hover:bg-${section.color}-50">
                      <div>
                        <p class="font-medium text-slate-900">${child.name}</p>
                        <p class="mt-1 text-sm text-slate-500">${child.desc}</p>
                      </div>
                      <span class="text-${section.color}-500">→</span>
                    </a>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </section>
        `
      });
    </script>
  </body>
</html>
