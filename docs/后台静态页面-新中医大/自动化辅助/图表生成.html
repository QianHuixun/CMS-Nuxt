<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图表生成 - 新中医大 CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../static-admin-theme.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="../static-admin-shell.js"></script>
    <script>
      renderPage({
        parent: "自动化辅助",
        child: "图表生成",
        title: "图表生成",
        description: "根据数据自动生成统计图表，支持多种图表类型（柱状图、折线图、饼图、雷达图等），一键导出。",
        badges: ["工具类页面", "数据可视化", "多图表类型"],
        stats: [
          { label: "已生成", value: "89", meta: "张图表", tone: "sky", help: "累计生成的图表数量" },
          { label: "本月使用", value: "15", meta: "次", tone: "emerald", help: "2026年4月图表生成次数" },
          { label: "支持类型", value: "6", meta: "种图表", tone: "amber", help: "柱状、折线、饼图、雷达等" }
        ],
        content: `
          <section class="grid gap-6 xl:grid-cols-[1fr_1.2fr]">
            <!-- 图表生成器 -->
            <div class="space-y-6">
              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <h3 class="text-lg font-semibold text-slate-900">图表生成器</h3>
                <p class="mt-1 text-sm text-slate-500">选择图表类型，输入数据内容，生成可视化图表。</p>

                <div class="mt-6 space-y-5">
                  <div>
                    <label class="mb-3 block text-sm font-medium text-slate-700">图表类型</label>
                    <div class="grid grid-cols-3 gap-3">
                      ${[
                        { name: "柱状图", icon: "📊", active: true },
                        { name: "折线图", icon: "📈", active: false },
                        { name: "饼图", icon: "🥧", active: false },
                        { name: "雷达图", icon: "🕸️", active: false },
                        { name: "散点图", icon: "⚫", active: false },
                        { name: "环形图", icon: "⭕", active: false }
                      ].map(chart => `
                        <button class="rounded-2xl border-2 ${chart.active ? 'border-sky-500 bg-sky-50' : 'border-slate-200 hover:border-slate-300'} p-4 text-center transition">
                          <div class="text-2xl mb-1">${chart.icon}</div>
                          <span class="text-sm font-medium ${chart.active ? 'text-sky-700' : 'text-slate-600'}">${chart.name}</span>
                        </button>
                      `).join('')}
                    </div>
                  </div>

                  <div>
                    <label class="mb-2 block text-sm font-medium text-slate-700">图表标题</label>
                    <input type="text" value="中药使用频率统计" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm focus:border-sky-300 focus:bg-white focus:outline-none">
                  </div>

                  <div>
                    <label class="mb-2 block text-sm font-medium text-slate-700">数据内容</label>
                    <textarea class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm focus:border-sky-300 focus:bg-white focus:outline-none" rows="5" placeholder="请输入数据，每行一个数据点，格式：标签,数值，如：&#10;当归,45&#10;人参,38&#10;黄芪,32&#10;..."></textarea>
                  </div>

                  <div>
                    <label class="mb-2 block text-sm font-medium text-slate-700">配色方案</label>
                    <div class="flex gap-2">
                      ${[
                        { name: "渐变蓝", color: "sky", active: true },
                        { name: "森林绿", color: "emerald", active: false },
                        { name: "暖色系", color: "amber", active: false },
                        { name: "商务灰", color: "slate", active: false }
                      ].map(palette => `
                        <button class="rounded-xl border-2 ${palette.active ? 'border-' + palette.color + '-400' : 'border-slate-200'} px-3 py-1.5 text-xs font-medium ${
                          palette.active ? 'text-' + palette.color + '-600' : 'text-slate-500'
                        } bg-${palette.color}-50">${palette.name}</button>
                      `).join('')}
                    </div>
                  </div>

                  <button class="w-full rounded-2xl bg-sky-600 px-4 py-3 text-sm font-semibold text-white">生成图表</button>
                </div>
              </div>

              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <h3 class="text-lg font-semibold text-slate-900">快速模板</h3>
                <div class="mt-4 grid gap-3">
                  ${[
                    { name: "年度论文统计", type: "柱状图", date: "2026-04-18" },
                    { name: "专家年龄分布", type: "饼图", date: "2026-04-15" },
                    { name: "科研经费趋势", type: "折线图", date: "2026-04-10" }
                  ].map(template => `
                    <div class="flex items-center justify-between rounded-2xl bg-slate-50 px-4 py-3">
                      <div>
                        <p class="font-medium text-slate-700">${template.name}</p>
                        <p class="text-xs text-slate-500">${template.type} · ${template.date}</p>
                      </div>
                      <button class="text-sm text-sky-600 hover:text-sky-700">使用</button>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>

            <!-- 图表预览 -->
            <div class="space-y-6">
              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <div class="flex items-center justify-between">
                  <h3 class="text-lg font-semibold text-slate-900">图表预览</h3>
                  <div class="flex gap-2">
                    <button class="rounded-xl border border-slate-200 px-3 py-1.5 text-sm text-slate-600 hover:bg-slate-50">下载 PNG</button>
                    <button class="rounded-xl border border-slate-200 px-3 py-1.5 text-sm text-slate-600 hover:bg-slate-50">导出数据</button>
                  </div>
                </div>

                <div class="mt-6 min-h-[400px] rounded-3xl border-2 border-dashed border-slate-300 bg-white p-6">
                  <h4 class="text-center text-lg font-semibold text-slate-800 mb-6">中药使用频率统计</h4>
                  
                  <!-- 模拟柱状图 -->
                  <div class="flex items-end justify-around h-[300px] px-8">
                    ${[
                      { name: "当归", value: 85, height: "85%" },
                      { name: "人参", value: 72, height: "72%" },
                      { name: "黄芪", value: 68, height: "68%" },
                      { name: "白术", value: 55, height: "55%" },
                      { name: "茯苓", value: 48, height: "48%" },
                      { name: "甘草", value: 42, height: "42%" },
                      { name: "川芎", value: 38, height: "38%" }
                    ].map(bar => `
                      <div class="flex flex-col items-center gap-2">
                        <div class="w-12 rounded-t-lg bg-gradient-to-t from-sky-500 to-sky-300 transition-all" style="height: ${bar.height}"></div>
                        <div class="text-sm font-medium text-slate-700">${bar.name}</div>
                        <div class="text-xs text-slate-400">${bar.value}</div>
                      </div>
                    `).join('')}
                  </div>
                  
                  <!-- 图例 -->
                  <div class="mt-6 flex justify-center gap-6">
                    <div class="flex items-center gap-2">
                      <div class="h-3 w-3 rounded bg-gradient-to-t from-sky-500 to-sky-300"></div>
                      <span class="text-sm text-slate-600">中药使用频次</span>
                    </div>
                  </div>
                </div>
              </div>

              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <h3 class="text-lg font-semibold text-slate-900">导出格式</h3>
                <div class="mt-4 flex flex-wrap gap-3">
                  <button class="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50">PNG 图片</button>
                  <button class="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50">SVG 矢量</button>
                  <button class="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50">PDF 文档</button>
                  <button class="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50">CSV 数据</button>
                </div>
              </div>
            </div>
          </section>
        `
      });
    </script>
  </body>
</html>
