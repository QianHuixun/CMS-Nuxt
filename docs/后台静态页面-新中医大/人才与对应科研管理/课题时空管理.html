<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>课题时空管理 - 新中医大 CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../static-admin-theme.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="../static-admin-shell.js"></script>
    <script>
      renderPage({
        parent: "人才与对应科研管理",
        child: "课题时空管理",
        title: "课题时空管理",
        description: "管理课题信息、时间节点与空间分布数据，支持甘特图视图和空间可视化展示。",
        badges: ["数据库类页面", "甘特图", "时空可视化"],
        stats: [
          { label: "课题总数", value: "45", meta: "个课题", tone: "sky", help: "包含国家级、省部级、厅局级课题" },
          { label: "进行中", value: "18", meta: "当前", tone: "amber", help: "处于研究阶段的课题" },
          { label: "已完成", value: "27", meta: "累计", tone: "emerald", help: "已结题的课题" }
        ],
        content: `
          <section class="space-y-6">
            <!-- 视图切换 -->
            <div class="flex items-center justify-between rounded-[28px] bg-white p-4 shadow-sm ring-1 ring-slate-200/80">
              <div class="flex gap-2">
                <button class="rounded-2xl bg-sky-600 px-4 py-2 text-sm font-semibold text-white">列表视图</button>
                <button class="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">甘特图</button>
                <button class="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">地图视图</button>
              </div>
              <div class="flex gap-2">
                <button class="rounded-2xl bg-sky-600 px-4 py-2 text-sm font-semibold text-white">+ 新增课题</button>
                <button class="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-600">批量导入</button>
              </div>
            </div>

            <!-- 筛选 -->
            <div class="rounded-[28px] bg-white p-4 shadow-sm ring-1 ring-slate-200/80">
              <div class="flex flex-wrap items-center gap-4">
                <input type="text" placeholder="搜索课题名称、编号..." class="flex-1 min-w-[200px] rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm focus:border-sky-300 focus:bg-white focus:outline-none">
                <select class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-600">
                  <option>全部级别</option>
                  <option>国家级</option>
                  <option>省部级</option>
                  <option>厅局级</option>
                </select>
                <select class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-600">
                  <option>全部状态</option>
                  <option>筹备中</option>
                  <option>进行中</option>
                  <option>已结题</option>
                </select>
                <select class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-600">
                  <option>全部年份</option>
                  <option>2026</option>
                  <option>2025</option>
                  <option>2024</option>
                </select>
              </div>
            </div>

            <!-- 课题列表 -->
            <div class="space-y-4">
              ${[
                { name: "中医经典文献数字化研究", code: "2026-ZY-001", level: "国家级", status: "进行中", start: "2026-01", end: "2027-12", progress: 35 },
                { name: "中药有效成分提取工艺优化", code: "2025-ZY-015", level: "省部级", status: "进行中", start: "2025-06", end: "2026-06", progress: 68 },
                { name: "针灸治疗失眠症的临床研究", code: "2025-ZJ-008", level: "厅局级", status: "进行中", start: "2025-03", end: "2026-03", progress: 82 },
                { name: "中医体质分类标准制定", code: "2024-ZY-022", level: "国家级", status: "已结题", start: "2024-01", end: "2025-12", progress: 100 },
                { name: "中药复方现代化研究", code: "2024-ZY-031", level: "省部级", status: "已结题", start: "2024-06", end: "2025-06", progress: 100 }
              ].map(item => `
                <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                  <div class="flex flex-wrap items-start justify-between gap-4">
                    <div class="flex-1 min-w-[300px]">
                      <div class="flex items-center gap-3">
                        <h4 class="text-lg font-semibold text-slate-900">${item.name}</h4>
                        <span class="inline-flex rounded-full px-2.5 py-1 text-xs font-semibold ring-1 ${
                          item.level === '国家级' ? 'bg-violet-50 text-violet-700 ring-violet-100' :
                          item.level === '省部级' ? 'bg-emerald-50 text-emerald-700 ring-emerald-100' :
                          'bg-sky-50 text-sky-700 ring-sky-100'
                        }">${item.level}</span>
                        <span class="inline-flex rounded-full px-2.5 py-1 text-xs font-semibold ring-1 ${
                          item.status === '进行中' ? 'bg-amber-50 text-amber-700 ring-amber-100' : 'bg-slate-100 text-slate-600 ring-slate-200'
                        }">${item.status}</span>
                      </div>
                      <p class="mt-2 text-sm text-slate-500">课题编号：${item.code}</p>
                      <div class="mt-3 flex flex-wrap gap-4 text-sm text-slate-600">
                        <span>开始时间：${item.start}</span>
                        <span>结束时间：${item.end}</span>
                        <span>负责人：张教授</span>
                      </div>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                      <div class="w-48">
                        <div class="flex justify-between text-sm mb-1">
                          <span class="text-slate-500">进度</span>
                          <span class="font-medium ${item.progress === 100 ? 'text-emerald-600' : 'text-slate-700'}">${item.progress}%</span>
                        </div>
                        <div class="h-2 rounded-full bg-slate-100">
                          <div class="h-full rounded-full ${
                            item.progress === 100 ? 'bg-emerald-500' : 'bg-sky-500'
                          }" style="width: ${item.progress}%"></div>
                        </div>
                      </div>
                      <div class="flex gap-2">
                        <button class="rounded-xl border border-slate-200 px-3 py-1.5 text-sm text-slate-600 hover:bg-slate-50">编辑</button>
                        <button class="rounded-xl border border-slate-200 px-3 py-1.5 text-sm text-slate-600 hover:bg-slate-50">详情</button>
                        <button class="rounded-xl text-rose-600 hover:text-rose-700 text-sm">删除</button>
                      </div>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>

            <!-- 分页 -->
            <div class="rounded-[28px] bg-white p-4 shadow-sm ring-1 ring-slate-200/80">
              <div class="flex items-center justify-between">
                <div class="text-sm text-slate-500">显示 1-5 条，共 45 条</div>
                <div class="flex gap-2">
                  <button class="rounded-xl border border-slate-200 px-3 py-1.5 text-sm text-slate-600 hover:bg-slate-50">上一页</button>
                  <button class="rounded-xl bg-sky-600 px-3 py-1.5 text-sm font-semibold text-white">1</button>
                  <button class="rounded-xl border border-slate-200 px-3 py-1.5 text-sm text-slate-600 hover:bg-slate-50">2</button>
                  <button class="rounded-xl border border-slate-200 px-3 py-1.5 text-sm text-slate-600 hover:bg-slate-50">...</button>
                  <button class="rounded-xl border border-slate-200 px-3 py-1.5 text-sm text-slate-600 hover:bg-slate-50">9</button>
                  <button class="rounded-xl border border-slate-200 px-3 py-1.5 text-sm text-slate-600 hover:bg-slate-50">下一页</button>
                </div>
              </div>
            </div>
          </section>
        `
      });
    </script>
  </body>
</html>
