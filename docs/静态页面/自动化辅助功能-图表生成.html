<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图表生成</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./static-admin-theme.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="./static-admin-shell.js"></script>
    <script>
      renderPage({
        parent: "自动化辅助功能",
        child: "图表生成",
        title: "图表生成",
        description: "基于年度录入数据自动生成论文数量折线图，并预留课题、专利和活动的多维统计扩展能力。",
        badges: ["统计页面", "ECharts 可落地", "静态原型"],
        stats: [
          { label: "统计年份", value: "2019-2026", meta: "时间范围", tone: "sky", help: "支持按年度聚合查询" },
          { label: "当前指标", value: "论文数量", meta: "折线图", tone: "emerald", help: "MVP 先聚焦单指标趋势" },
          { label: "导出格式", value: "PNG", meta: "后续增强", tone: "amber", help: "支持导出图表快照用于汇报" }
        ],
        content: `
          <section class="grid gap-6 xl:grid-cols-[0.8fr_1.2fr]">
            <div class="space-y-6">
              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <h3 class="text-lg font-semibold text-slate-900">查询条件</h3>
                <div class="mt-5 grid gap-4">
                  ${[
                    ["统计对象", "论文数量"],
                    ["时间范围", "2019 - 2026"],
                    ["分组方式", "按年度"],
                    ["展示形式", "折线图"]
                  ]
                    .map(
                      item => `
                        <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4">
                          <div class="text-sm text-slate-500">${item[0]}</div>
                          <div class="mt-2 text-sm font-semibold text-slate-900">${item[1]}</div>
                        </div>`
                    )
                    .join("")}
                </div>
                <div class="mt-6 flex gap-3">
                  <button class="rounded-2xl bg-sky-600 px-4 py-2 text-sm font-semibold text-white">生成图表</button>
                  <button class="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700">导出图片</button>
                </div>
              </div>

              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <h3 class="text-lg font-semibold text-slate-900">关键结论</h3>
                <div class="mt-4 space-y-3 text-sm text-slate-600">
                  <div class="rounded-2xl bg-slate-50 px-4 py-3">2023 至 2025 年论文数量持续上升，说明录入与产出同步增长。</div>
                  <div class="rounded-2xl bg-slate-50 px-4 py-3">2026 年数据暂未完结，当前值可能随着导入继续上浮。</div>
                  <div class="rounded-2xl bg-slate-50 px-4 py-3">第二阶段可增加课题、专利、活动数量对比图与组合统计看板。</div>
                </div>
              </div>
            </div>

            <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
              <div class="flex items-center justify-between">
                <div>
                  <h3 class="text-lg font-semibold text-slate-900">年度趋势图</h3>
                  <p class="mt-1 text-sm text-slate-500">此处静态模拟 ECharts 折线图版式与图例区域。</p>
                </div>
                <span class="rounded-full bg-sky-50 px-3 py-1 text-xs font-semibold text-sky-700">论文数量</span>
              </div>
              <div class="mt-6 rounded-[28px] bg-slate-50 p-6">
                <svg viewBox="0 0 760 360" class="w-full">
                  <defs>
                    <linearGradient id="lineColor" x1="0" x2="1">
                      <stop offset="0%" stop-color="#60a5fa" />
                      <stop offset="100%" stop-color="#2563eb" />
                    </linearGradient>
                  </defs>
                  <g stroke="#cbd5e1" stroke-width="1">
                    <line x1="70" y1="40" x2="70" y2="300" />
                    <line x1="70" y1="300" x2="710" y2="300" />
                    <line x1="70" y1="90" x2="710" y2="90" stroke-dasharray="4 8" />
                    <line x1="70" y1="145" x2="710" y2="145" stroke-dasharray="4 8" />
                    <line x1="70" y1="200" x2="710" y2="200" stroke-dasharray="4 8" />
                    <line x1="70" y1="250" x2="710" y2="250" stroke-dasharray="4 8" />
                  </g>
                  <path d="M90 248 C140 230, 180 220, 230 205 S330 175, 390 150 S500 112, 560 98 S650 86, 690 76" fill="none" stroke="url(#lineColor)" stroke-width="6" stroke-linecap="round" />
                  ${[
                    [90, 248, "2019"],
                    [170, 222, "2020"],
                    [250, 198, "2021"],
                    [330, 180, "2022"],
                    [430, 142, "2023"],
                    [550, 98, "2024"],
                    [620, 88, "2025"],
                    [690, 76, "2026"]
                  ]
                    .map(
                      point => `
                        <circle cx="${point[0]}" cy="${point[1]}" r="7" fill="#fff" stroke="#2563eb" stroke-width="4"></circle>
                        <text x="${point[0]}" y="330" text-anchor="middle" fill="#64748b" font-size="14">${point[2]}</text>`
                    )
                    .join("")}
                </svg>
              </div>
            </div>
          </section>
        `
      });
    </script>
  </body>
</html>
