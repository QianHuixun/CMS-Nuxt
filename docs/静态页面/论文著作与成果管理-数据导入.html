<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数据导入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./static-admin-theme.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="./static-admin-shell.js"></script>
    <script>
      renderPage({
        parent: "论文著作与成果管理",
        child: "数据导入",
        title: "数据导入",
        description: "统一承接论文、课题、专利的批量导入、导入结果展示与精选标记，并预留专利视频与封面帧处理能力。",
        badges: ["导入型页面", "分页结果", "静态原型"],
        stats: [
          { label: "累计导入", value: "326", meta: "成果主数据", tone: "sky", help: "论文、课题、专利统一纳入统计" },
          { label: "精选论文", value: "28", meta: "前台精选", tone: "emerald", help: "可用于前台重点成果展示" },
          { label: "失败记录", value: "6", meta: "待修正", tone: "rose", help: "字段缺失或格式不符合模板要求" }
        ],
        content: `
          <section class="space-y-6">
            <div class="grid gap-6 lg:grid-cols-3">
              ${[
                ["论文导入", "支持 Excel 批量导入标题、作者、期刊、年份等元数据。", "上传模板"],
                ["课题导入", "支持负责人、级别、摘要、立项年份等信息导入。", "批量导入"],
                ["专利导入", "支持基本信息导入，并在后续补充视频和封面帧。", "继续编辑"]
              ]
                .map(
                  item => `
                    <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                      <div class="text-lg font-semibold text-slate-900">${item[0]}</div>
                      <div class="mt-3 text-sm leading-7 text-slate-500">${item[1]}</div>
                      <button class="mt-6 rounded-2xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white">${item[2]}</button>
                    </div>`
                )
                .join("")}
            </div>

            <div class="grid gap-6 xl:grid-cols-[1.15fr_0.85fr]">
              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <div class="flex items-center justify-between">
                  <h3 class="text-lg font-semibold text-slate-900">导入结果列表</h3>
                  <div class="flex gap-3">
                    <button class="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700">下载失败报告</button>
                    <button class="rounded-2xl bg-sky-600 px-4 py-2 text-sm font-semibold text-white">重新导入</button>
                  </div>
                </div>
                <div class="mt-5 overflow-hidden rounded-3xl border border-slate-200">
                  <table class="min-w-full divide-y divide-slate-200 text-sm">
                    <thead class="bg-slate-50 text-slate-500">
                      <tr>
                        <th class="px-4 py-3 text-left font-medium">名称</th>
                        <th class="px-4 py-3 text-left font-medium">类型</th>
                        <th class="px-4 py-3 text-left font-medium">精选</th>
                        <th class="px-4 py-3 text-left font-medium">状态</th>
                      </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 bg-white text-slate-700">
                      <tr><td class="px-4 py-4">《天回医简数字化整理研究》</td><td class="px-4 py-4">论文</td><td class="px-4 py-4">是</td><td class="px-4 py-4">导入成功</td></tr>
                      <tr><td class="px-4 py-4">川派医籍智能标注平台建设</td><td class="px-4 py-4">课题</td><td class="px-4 py-4">否</td><td class="px-4 py-4">导入成功</td></tr>
                      <tr><td class="px-4 py-4">古籍图像结构化识别方法</td><td class="px-4 py-4">专利</td><td class="px-4 py-4">否</td><td class="px-4 py-4">待补视频</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>

              <div class="space-y-6">
                <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                  <h3 class="text-lg font-semibold text-slate-900">专利视频补录</h3>
                  <div class="mt-4 rounded-[28px] border border-dashed border-slate-300 p-6">
                    <div class="aspect-[16/9] rounded-[24px] bg-gradient-to-br from-slate-100 to-sky-100"></div>
                    <div class="mt-4 text-sm text-slate-500">上传 MP4 后自动生成封面帧，也支持手动替换封面图。</div>
                    <div class="mt-4 flex gap-3">
                      <button class="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700">上传视频</button>
                      <button class="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700">上传封面</button>
                    </div>
                  </div>
                </div>

                <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                  <h3 class="text-lg font-semibold text-slate-900">精选策略</h3>
                  <div class="mt-4 space-y-3 text-sm text-slate-600">
                    <div class="rounded-2xl bg-slate-50 px-4 py-3">论文支持手动打精选标签，供前台重点展示。</div>
                    <div class="rounded-2xl bg-slate-50 px-4 py-3">导入成功后仍允许进入编辑页补充 PDF、视频或封面信息。</div>
                    <div class="rounded-2xl bg-slate-50 px-4 py-3">失败记录需保留错误原因，便于运营修复后重传。</div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        `
      });
    </script>
  </body>
</html>
