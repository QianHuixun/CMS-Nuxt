<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>词云</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./static-admin-theme.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="./static-admin-shell.js"></script>
    <script>
      renderPage({
        parent: "自动化辅助功能",
        child: "词云",
        title: "词云",
        description: "围绕论文摘要与人工维护关键词生成可视化词云，支持权重调整、单篇提取和全库汇总两类视图。",
        badges: ["自动化辅助", "可视化页面", "静态原型"],
        stats: [
          { label: "关键词条", value: "86", meta: "全库汇总", tone: "sky", help: "来源于论文摘要提取与人工维护" },
          { label: "待确认词", value: "12", meta: "人工复核", tone: "amber", help: "需去重或调整权重后再发布" },
          { label: "当前主题", value: "天回医简", meta: "单篇预览", tone: "emerald", help: "聚焦单篇论文的关键词抽取结果" }
        ],
        content: `
          <section class="grid gap-6 xl:grid-cols-[1.06fr_0.94fr]">
            <div class="space-y-6">
              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <div class="flex items-center justify-between">
                  <div>
                    <h3 class="text-lg font-semibold text-slate-900">词云预览</h3>
                    <p class="mt-1 text-sm text-slate-500">支持单篇论文关键词和全库关键词两个维度切换。</p>
                  </div>
                  <div class="flex gap-3">
                    <button class="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700">单篇论文</button>
                    <button class="rounded-2xl bg-sky-600 px-4 py-2 text-sm font-semibold text-white">全部论文</button>
                  </div>
                </div>

                <div class="grid-paper mt-6 rounded-[32px] p-6">
                  <div class="flex min-h-[320px] flex-wrap items-center justify-center gap-4 rounded-[24px] bg-white/80 p-8 ring-1 ring-white/60">
                    <span class="word-chip bg-sky-100 text-sky-700 text-3xl">天回医简</span>
                    <span class="word-chip bg-indigo-100 text-indigo-700 text-2xl">释文整理</span>
                    <span class="word-chip bg-emerald-100 text-emerald-700 text-xl">古籍数字化</span>
                    <span class="word-chip bg-amber-100 text-amber-700 text-lg">文本标注</span>
                    <span class="word-chip bg-slate-100 text-slate-700 text-base">图像识别</span>
                    <span class="word-chip bg-rose-100 text-rose-700 text-xl">医学文献</span>
                    <span class="word-chip bg-violet-100 text-violet-700 text-lg">知识组织</span>
                    <span class="word-chip bg-sky-100 text-sky-700 text-2xl">竹简</span>
                    <span class="word-chip bg-emerald-100 text-emerald-700 text-base">关系抽取</span>
                    <span class="word-chip bg-amber-100 text-amber-700 text-xl">川派医学</span>
                  </div>
                </div>
              </div>
            </div>

            <div class="space-y-6">
              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <h3 class="text-lg font-semibold text-slate-900">关键词权重</h3>
                <div class="mt-5 space-y-3">
                  ${[
                    ["天回医简", "98", "自动提取 + 人工提升"],
                    ["释文整理", "84", "自动提取"],
                    ["古籍数字化", "73", "人工维护"],
                    ["图像识别", "56", "待校正"]
                  ]
                    .map(
                      item => `
                        <div class="rounded-2xl border border-slate-200 p-4">
                          <div class="flex items-center justify-between gap-4">
                            <div>
                              <div class="text-sm font-semibold text-slate-900">${item[0]}</div>
                              <div class="mt-1 text-xs text-slate-500">${item[2]}</div>
                            </div>
                            <div class="text-lg font-bold text-slate-900">${item[1]}</div>
                          </div>
                          <div class="mt-4 h-2 rounded-full bg-slate-100">
                            <div class="h-2 rounded-full bg-sky-500" style="width:${item[1]}%"></div>
                          </div>
                        </div>`
                    )
                    .join("")}
                </div>
              </div>

              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <h3 class="text-lg font-semibold text-slate-900">说明</h3>
                <div class="mt-4 space-y-3 text-sm text-slate-600">
                  <div class="rounded-2xl bg-slate-50 px-4 py-3">第一阶段可以允许人工维护关键词字段，不强依赖复杂分词模型。</div>
                  <div class="rounded-2xl bg-slate-50 px-4 py-3">权重数值越高，前台词云中字号越大、颜色越强调。</div>
                  <div class="rounded-2xl bg-slate-50 px-4 py-3">后续可增加关键词合并、别名归一和时间维度筛选能力。</div>
                </div>
              </div>
            </div>
          </section>
        `
      });
    </script>
  </body>
</html>
