<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>淳渔 CMS 静态页面导航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./static-admin-theme.css" />
  </head>
  <body>
    <div class="min-h-screen bg-slate-100">
      <div class="mx-auto max-w-7xl px-6 py-10">
        <div class="rounded-[32px] bg-[#1f2747] px-8 py-10 text-white panel-glow">
          <p class="text-sm uppercase tracking-[0.3em] text-sky-300">Docs Preview</p>
          <h1 class="mt-4 text-4xl font-bold">后台子菜单静态页面导航</h1>
          <p class="mt-4 max-w-3xl text-sm leading-7 text-slate-300">
            这批页面根据 `项目需求.md`、`项目需求分析.md` 和 `UI风格.md` 生成，
            保留当前后台“深色侧栏 + 浅色顶栏 + 白色内容区”的稳重中后台气质，并用 TailwindCSS
            做了一层更清晰的静态原型表达。
          </p>
        </div>

        <div class="mt-8 grid gap-6 lg:grid-cols-2 xl:grid-cols-3">
          <section class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
            <p class="text-xs font-semibold uppercase tracking-[0.2em] text-sky-600">系统基础配置管理</p>
            <div class="mt-4 space-y-3">
              <a class="block rounded-2xl border border-slate-200 px-4 py-4 hover:border-sky-300 hover:bg-sky-50" href="./系统基础配置管理-导航配置.html">导航配置</a>
              <a class="block rounded-2xl border border-slate-200 px-4 py-4 hover:border-sky-300 hover:bg-sky-50" href="./系统基础配置管理-屏保配置.html">屏保配置</a>
            </div>
          </section>

          <section class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
            <p class="text-xs font-semibold uppercase tracking-[0.2em] text-sky-600">资源导航管理</p>
            <div class="mt-4 space-y-3">
              <a class="block rounded-2xl border border-slate-200 px-4 py-4 hover:border-sky-300 hover:bg-sky-50" href="./资源导航管理-资源录入.html">资源录入</a>
              <a class="block rounded-2xl border border-slate-200 px-4 py-4 hover:border-sky-300 hover:bg-sky-50" href="./资源导航管理-卡片管理.html">卡片管理</a>
            </div>
          </section>

          <section class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
            <p class="text-xs font-semibold uppercase tracking-[0.2em] text-sky-600">人才与对应科研管理</p>
            <div class="mt-4 space-y-3">
              <a class="block rounded-2xl border border-slate-200 px-4 py-4 hover:border-sky-300 hover:bg-sky-50" href="./人才与对应科研管理-人才管理.html">人才管理</a>
            </div>
          </section>

          <section class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
            <p class="text-xs font-semibold uppercase tracking-[0.2em] text-sky-600">论文著作与成果管理</p>
            <div class="mt-4 space-y-3">
              <a class="block rounded-2xl border border-slate-200 px-4 py-4 hover:border-sky-300 hover:bg-sky-50" href="./论文著作与成果管理-数据导入.html">数据导入</a>
              <a class="block rounded-2xl border border-slate-200 px-4 py-4 hover:border-sky-300 hover:bg-sky-50" href="./论文著作与成果管理-书籍仿真录入.html">书籍仿真录入</a>
            </div>
          </section>

          <section class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
            <p class="text-xs font-semibold uppercase tracking-[0.2em] text-sky-600">自动化辅助功能</p>
            <div class="mt-4 space-y-3">
              <a class="block rounded-2xl border border-slate-200 px-4 py-4 hover:border-sky-300 hover:bg-sky-50" href="./自动化辅助功能-词云.html">词云</a>
              <a class="block rounded-2xl border border-slate-200 px-4 py-4 hover:border-sky-300 hover:bg-sky-50" href="./自动化辅助功能-图表生成.html">图表生成</a>
            </div>
          </section>

          <section class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
            <p class="text-xs font-semibold uppercase tracking-[0.2em] text-sky-600">活动管理</p>
            <div class="mt-4 space-y-3">
              <a class="block rounded-2xl border border-slate-200 px-4 py-4 hover:border-sky-300 hover:bg-sky-50" href="./活动管理-沉浸式编辑.html">沉浸式编辑</a>
              <a class="block rounded-2xl border border-slate-200 px-4 py-4 hover:border-sky-300 hover:bg-sky-50" href="./活动管理-头条精选.html">头条精选</a>
            </div>
          </section>
        </div>
      </div>
    </div>
  </body>
</html>
