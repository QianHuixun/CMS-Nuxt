<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>屏保配置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./static-admin-theme.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="./static-admin-shell.js"></script>
    <script>
      renderPage({
        parent: "系统基础配置管理",
        child: "屏保配置",
        title: "屏保配置",
        description: "配置无人触碰后的开屏页素材、触发时间和轮播顺序，优先覆盖视频与图片两种媒体形态。",
        badges: ["媒体配置", "静态原型", "待接入上传"],
        stats: [
          { label: "当前方案", value: "晨昏双景", meta: "已发布", tone: "emerald", help: "包含 1 个视频和 3 张轮播图" },
          { label: "触发时间", value: "90s", meta: "无人操作", tone: "sky", help: "超过设定时长后自动进入屏保" },
          { label: "媒体数量", value: "4", meta: "素材库", tone: "amber", help: "可按顺序循环播放" }
        ],
        content: `
          <section class="grid gap-6 xl:grid-cols-[0.95fr_1.05fr]">
            <div class="space-y-6">
              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <h3 class="text-lg font-semibold text-slate-900">播放参数</h3>
                <div class="mt-6 grid gap-4 md:grid-cols-2">
                  <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4">
                    <div class="text-sm text-slate-500">触发时间</div>
                    <div class="mt-2 text-xl font-semibold text-slate-900">90 秒</div>
                  </div>
                  <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4">
                    <div class="text-sm text-slate-500">播放方式</div>
                    <div class="mt-2 text-xl font-semibold text-slate-900">视频优先，图片轮播</div>
                  </div>
                  <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4">
                    <div class="text-sm text-slate-500">切换动画</div>
                    <div class="mt-2 text-xl font-semibold text-slate-900">淡入淡出</div>
                  </div>
                  <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4">
                    <div class="text-sm text-slate-500">手动打断</div>
                    <div class="mt-2 text-xl font-semibold text-slate-900">任意触摸退出</div>
                  </div>
                </div>
                <div class="mt-6 flex gap-3">
                  <button class="rounded-2xl bg-sky-600 px-4 py-2 text-sm font-semibold text-white">保存配置</button>
                  <button class="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700">恢复默认</button>
                </div>
              </div>

              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <h3 class="text-lg font-semibold text-slate-900">素材列表</h3>
                <div class="mt-5 space-y-3">
                  ${[
                    ["封面视频 / campus.mp4", "00:36", "视频", "优先播放"],
                    ["静态图 / hall-01.jpg", "3840×2160", "图片", "第 2 张"],
                    ["静态图 / hall-02.jpg", "3840×2160", "图片", "第 3 张"],
                    ["静态图 / poster-03.jpg", "3840×2160", "图片", "第 4 张"]
                  ]
                    .map(
                      item => `
                        <div class="flex items-center gap-4 rounded-2xl border border-slate-200 px-4 py-4">
                          <div class="h-14 w-20 rounded-2xl bg-gradient-to-br from-slate-200 to-slate-100"></div>
                          <div class="min-w-0 flex-1">
                            <div class="truncate text-sm font-semibold text-slate-900">${item[0]}</div>
                            <div class="mt-1 text-xs text-slate-500">${item[1]}</div>
                          </div>
                          <div class="text-right text-xs text-slate-500">
                            <div>${item[2]}</div>
                            <div class="mt-1 font-semibold text-slate-700">${item[3]}</div>
                          </div>
                        </div>`
                    )
                    .join("")}
                </div>
              </div>
            </div>

            <div class="space-y-6">
              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <h3 class="text-lg font-semibold text-slate-900">屏保预览</h3>
                <div class="mt-6 rounded-[32px] bg-[#0f172a] p-4">
                  <div class="aspect-[16/9] rounded-[24px] bg-gradient-to-br from-sky-200 via-slate-100 to-indigo-200 p-6">
                    <div class="flex h-full flex-col justify-between rounded-[20px] border border-white/50 bg-white/35 p-6 backdrop-blur">
                      <div>
                        <div class="inline-flex rounded-full bg-white/70 px-3 py-1 text-xs font-semibold text-slate-700">待机屏保预览</div>
                        <div class="mt-4 text-3xl font-bold text-slate-900">成都中医药数字资源中心</div>
                        <div class="mt-2 max-w-xl text-sm leading-6 text-slate-700">无人操作 90 秒后自动播放，支持视频优先与图片轮播切换。</div>
                      </div>
                      <div class="grid gap-3 md:grid-cols-3">
                        <div class="rounded-2xl bg-white/80 p-4 text-sm font-medium text-slate-700">封面视频</div>
                        <div class="rounded-2xl bg-white/60 p-4 text-sm font-medium text-slate-700">轮播图 01</div>
                        <div class="rounded-2xl bg-white/60 p-4 text-sm font-medium text-slate-700">轮播图 02</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <h3 class="text-lg font-semibold text-slate-900">MVP 建议</h3>
                <div class="mt-4 space-y-3 text-sm text-slate-600">
                  <div class="rounded-2xl bg-slate-50 px-4 py-3">第一阶段优先完成上传、排序、触发时间配置和预览能力。</div>
                  <div class="rounded-2xl bg-slate-50 px-4 py-3">视频自动压缩可后置，先确保 MP4 上传与封面截取链路可用。</div>
                  <div class="rounded-2xl bg-slate-50 px-4 py-3">若素材为空，前台应自动回退到默认品牌图。</div>
                </div>
              </div>
            </div>
          </section>
        `
      });
    </script>
  </body>
</html>
