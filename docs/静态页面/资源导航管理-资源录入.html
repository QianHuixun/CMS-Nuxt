<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>资源录入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./static-admin-theme.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="./static-admin-shell.js"></script>
    <script>
      renderPage({
        parent: "资源导航管理",
        child: "资源录入",
        title: "资源录入",
        description: "通过标准化表单维护实验室数据库、平台工具和软件演示内容，为前台资源导航提供结构化数据。",
        badges: ["CRUD 页面", "资源主数据", "静态原型"],
        stats: [
          { label: "资源总数", value: "18", meta: "全部", tone: "sky", help: "数据库与分析工具合并统计" },
          { label: "前台展示", value: "14", meta: "已上架", tone: "emerald", help: "其余资源处于维护或待审核状态" },
          { label: "今日新增", value: "2", meta: "运营录入", tone: "amber", help: "其中 1 个带演示视频" }
        ],
        content: `
          <section class="grid gap-6 xl:grid-cols-[1.05fr_0.95fr]">
            <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
              <div class="flex items-center justify-between">
                <div>
                  <h3 class="text-lg font-semibold text-slate-900">资源信息表单</h3>
                  <p class="mt-1 text-sm text-slate-500">适用于数据库、平台入口、分析工具等资源类型。</p>
                </div>
                <button class="rounded-2xl bg-sky-600 px-4 py-2 text-sm font-semibold text-white">保存资源</button>
              </div>

              <div class="mt-6 grid gap-4 md:grid-cols-2">
                ${[
                  ["资源名称", "天回医简全文数据库"],
                  ["资源分类", "数据库集群"],
                  ["访问链接", "https://lab.example.com/resource/tianhui"],
                  ["展示状态", "显示中"]
                ]
                  .map(
                    item => `
                      <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4">
                        <div class="text-sm text-slate-500">${item[0]}</div>
                        <div class="mt-2 text-sm font-semibold text-slate-900">${item[1]}</div>
                      </div>`
                  )
                  .join("")}
                <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4 md:col-span-2">
                  <div class="text-sm text-slate-500">资源简介</div>
                  <div class="mt-2 text-sm leading-7 text-slate-700">聚合天回医简相关元数据、释文、图像与检索能力，支持研究人员按词条、年代和主题进行快速查询。</div>
                </div>
                <div class="rounded-2xl border border-dashed border-slate-300 p-5 md:col-span-2">
                  <div class="flex items-center justify-between">
                    <div>
                      <div class="text-sm font-semibold text-slate-900">封面与演示视频</div>
                      <div class="mt-1 text-sm text-slate-500">支持封面上传、视频上传与封面帧自动生成。</div>
                    </div>
                    <div class="flex gap-3">
                      <button class="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700">上传封面</button>
                      <button class="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700">上传视频</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="space-y-6">
              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <h3 class="text-lg font-semibold text-slate-900">最近录入</h3>
                <div class="mt-5 overflow-hidden rounded-3xl border border-slate-200">
                  <table class="min-w-full divide-y divide-slate-200 text-sm">
                    <thead class="bg-slate-50 text-slate-500">
                      <tr>
                        <th class="px-4 py-3 text-left font-medium">资源</th>
                        <th class="px-4 py-3 text-left font-medium">类型</th>
                        <th class="px-4 py-3 text-left font-medium">状态</th>
                      </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 bg-white text-slate-700">
                      ${[
                        ["天回医简全文数据库", "数据库", "展示中"],
                        ["本草图谱智能检索", "自研工具", "审核中"],
                        ["川派医籍知识问答", "自研工具", "展示中"]
                      ]
                        .map(
                          row => `
                            <tr>
                              <td class="px-4 py-4 font-medium">${row[0]}</td>
                              <td class="px-4 py-4">${row[1]}</td>
                              <td class="px-4 py-4">${row[2]}</td>
                            </tr>`
                        )
                        .join("")}
                    </tbody>
                  </table>
                </div>
              </div>

              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <h3 class="text-lg font-semibold text-slate-900">卡片预览</h3>
                <div class="mt-5 rounded-[28px] bg-slate-50 p-5">
                  <div class="rounded-[24px] bg-white p-5 ring-1 ring-slate-200">
                    <div class="aspect-[16/9] rounded-[20px] bg-gradient-to-br from-sky-100 to-indigo-100"></div>
                    <div class="mt-4 text-lg font-semibold text-slate-900">天回医简全文数据库</div>
                    <div class="mt-2 text-sm leading-6 text-slate-500">聚合古籍图片、释文、主题标签与专题研究入口。</div>
                    <div class="mt-4 flex items-center justify-between text-sm">
                      <span class="rounded-full bg-emerald-50 px-3 py-1 font-semibold text-emerald-700">展示中</span>
                      <span class="text-slate-400">排序 01</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        `
      });
    </script>
  </body>
</html>
