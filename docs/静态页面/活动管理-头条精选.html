<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>头条精选</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./static-admin-theme.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="./static-admin-shell.js"></script>
    <script>
      renderPage({
        parent: "活动管理",
        child: "头条精选",
        title: "头条精选",
        description: "给重要活动或新闻打上头条标签，并配置排序与上下架状态，让前端活动卡片流优先呈现重点内容。",
        badges: ["运营页面", "置顶管理", "静态原型"],
        stats: [
          { label: "头条数量", value: "5", meta: "当前生效", tone: "rose", help: "活动列表顶部优先展示" },
          { label: "候选内容", value: "18", meta: "可加入精选", tone: "sky", help: "来自已发布活动与新闻内容" },
          { label: "排序模式", value: "人工", meta: "可调优先级", tone: "emerald", help: "支持头条顺序和上下架控制" }
        ],
        content: `
          <section class="grid gap-6 xl:grid-cols-[1.04fr_0.96fr]">
            <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
              <div class="flex items-center justify-between">
                <div>
                  <h3 class="text-lg font-semibold text-slate-900">头条列表</h3>
                  <p class="mt-1 text-sm text-slate-500">当前按前台展示优先级排序，支持快速上移下移和状态切换。</p>
                </div>
                <button class="rounded-2xl bg-sky-600 px-4 py-2 text-sm font-semibold text-white">新增头条</button>
              </div>
              <div class="mt-6 space-y-4">
                ${[
                  ["01", "2026 中医文献数字化专题论坛", "已发布", "活动"],
                  ["02", "天回医简数据库正式上线", "已发布", "新闻"],
                  ["03", "实验室开放日与成果展映", "预热中", "活动"],
                  ["04", "古籍识别模型阶段成果发布", "已发布", "新闻"]
                ]
                  .map(
                    item => `
                      <div class="rounded-3xl border border-slate-200 p-5">
                        <div class="flex flex-col gap-4 lg:flex-row lg:items-center">
                          <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-rose-50 text-base font-bold text-rose-600">${item[0]}</div>
                          <div class="min-w-0 flex-1">
                            <div class="truncate text-base font-semibold text-slate-900">${item[1]}</div>
                            <div class="mt-2 flex flex-wrap gap-2 text-xs">
                              <span class="rounded-full bg-slate-100 px-3 py-1 font-semibold text-slate-600">${item[2]}</span>
                              <span class="rounded-full bg-sky-50 px-3 py-1 font-semibold text-sky-700">${item[3]}</span>
                              <span class="rounded-full bg-rose-50 px-3 py-1 font-semibold text-rose-700">头条展示中</span>
                            </div>
                          </div>
                          <div class="flex gap-3">
                            <button class="rounded-2xl border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700">上移</button>
                            <button class="rounded-2xl border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700">下移</button>
                            <button class="rounded-2xl border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700">下架</button>
                          </div>
                        </div>
                      </div>`
                  )
                  .join("")}
              </div>
            </div>

            <div class="space-y-6">
              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <h3 class="text-lg font-semibold text-slate-900">前台展示预览</h3>
                <div class="mt-5 rounded-[28px] bg-slate-50 p-5">
                  <div class="space-y-4">
                    ${[
                      ["头条 01", "2026 中医文献数字化专题论坛"],
                      ["头条 02", "天回医简数据库正式上线"],
                      ["头条 03", "实验室开放日与成果展映"]
                    ]
                      .map(
                        item => `
                          <div class="rounded-[24px] bg-white p-4 ring-1 ring-slate-200">
                            <div class="text-xs font-semibold uppercase tracking-[0.2em] text-rose-500">${item[0]}</div>
                            <div class="mt-2 text-base font-semibold text-slate-900">${item[1]}</div>
                          </div>`
                      )
                      .join("")}
                  </div>
                </div>
              </div>

              <div class="rounded-[28px] bg-white p-6 shadow-sm ring-1 ring-slate-200/80">
                <h3 class="text-lg font-semibold text-slate-900">运营提醒</h3>
                <div class="mt-4 space-y-3 text-sm text-slate-600">
                  <div class="rounded-2xl bg-slate-50 px-4 py-3">只有“已发布”的活动或新闻才允许进入头条精选池。</div>
                  <div class="rounded-2xl bg-slate-50 px-4 py-3">头条下架后内容本身仍保留在普通活动列表中，不应删除原内容。</div>
                  <div class="rounded-2xl bg-slate-50 px-4 py-3">建议保留头条有效期字段，避免活动过期后仍停留在顶部。</div>
                </div>
              </div>
            </div>
          </section>
        `
      });
    </script>
  </body>
</html>
